# docker compose up --build --no-deps --force-recreate --remove-orphans
services:
  jenkins:
    image: jenkins/jenkins:lts-local
    container_name: jenkins
    build:
      context: .
      dockerfile: ./jenkins.Dockerfile
    privileged: true
    user: root
    networks:
      - local_network
    ports:
      - "8080:8080" # Access UI at http://localhost:8080
      - "50000:50000"
    environment:
      ENV: local
      JAVA_OPTS: -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true
    volumes:
      - .:/app
      - /app/.jenkins_configuration
      - .jenkins_configuration:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/bin/docker:/usr/bin/docker # - $(which docker):/usr/bin/docker
    restart: unless-stopped

  # agent:
  #   image: jenkins/ssh-agent:jdk11
  #   container_name: jenkins-agent
  #   privileged: true
  #   user: root
  #   expose:
  #     - 22
  #   environment:
  #     - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBLIC_KEY}

networks:
  local_network:
    driver: bridge
